<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ágille Soluções Financeiras</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="consignado.css">
</head>

<section class="form-left">

  <div class="titulo-pill">
    SIMULE AGORA COM O FORMULÁRIO ABAIXO:
  </div>

  <form onsubmit="enviarFormulario(event)">

    <div class="campo">
      <label>NOME COMPLETO:</label>
      <input type="text" id="nome">
    </div>

    <div class="campo">
      <label>E-MAIL:</label>
      <input type="email" id="email">
    </div>

    <div class="campo">
      <label>TELEFONE OU CELULAR</label>
      <input type="text" id="celular">
    </div>

    <div class="campo">
      <label>CPF:</label>
      <input type="text" id="cpf">
    </div>

    <div class="campo">
      <label>VALOR DESEJADO:</label>
      <input type="number" id="valor">
    </div>

    <div class="campo">
      <label>PARCELAS:</label>
      <select id="parcelas">
        <option></option>
        <option>12x</option>
        <option>24x</option>
        <option>36x</option>
      </select>
    </div>

    <div class="campo">
      <label>CONVÊNIO:</label>
      <select id="convenio">
        <option></option>
        <option>INSS</option>
        <option>CLT</option>
        <option>Servidor</option>
      </select>
    </div>

    <div class="campo">
      <label>HORÁRIO DISPONÍVEL PARA CONTATO:</label>
      <select id="horario">
        <option></option>
        <option>Manhã</option>
        <option>Tarde</option>
        <option>Noite</option>
      </select>
    </div>

    <button class="btn-enviar">ENVIAR</button>

  </form>

</section>
